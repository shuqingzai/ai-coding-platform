asyncapi: "3.0.0"
info:
  title: AI Coding Platform — WebSocket Chat API
  description: |
    基于 AI SDK UI Stream Protocol v1 的 Agentic Chat WebSocket 协议。

    **核心特性**:
    - 全双工流式对话，20 种服务端消息类型 + 3 种客户端消息类型
    - AI Agent 16 个工具调用
    - Question/Answer 双向交互流程 (60s 超时)
    - Todo 实时推送
    - 单连接单消息处理 (重复 chat 消息返回 error)
  version: "1.0.0"
  contact:
    name: AI Coding Platform
    url: https://github.com/anomalyco/opencode

servers:
  local:
    host: localhost:3001
    pathname: /ws/chat
    protocol: ws
    description: 本地开发服务器

channels:
  chat:
    address: /ws/chat
    description: "Agentic Chat 全双工 WebSocket 端点。客户端发送 chat/cancel/answer 消息，服务端流式返回 20 种事件。"
    messages:
      clientToServer:
        summary: "客户端发送的消息 (chat / cancel / answer)"
        payload:
          oneOf:
            - $ref: "#/components/schemas/chatPayload"
            - $ref: "#/components/schemas/cancelPayload"
            - $ref: "#/components/schemas/answerPayload"
      serverToClient:
        summary: "服务端流式返回的消息 (20 种事件类型)"
        payload:
          oneOf:
            - $ref: "#/components/schemas/startPayload"
            - $ref: "#/components/schemas/donePayload"
            - $ref: "#/components/schemas/textStartPayload"
            - $ref: "#/components/schemas/textDeltaPayload"
            - $ref: "#/components/schemas/textEndPayload"
            - $ref: "#/components/schemas/reasoningStartPayload"
            - $ref: "#/components/schemas/reasoningDeltaPayload"
            - $ref: "#/components/schemas/reasoningEndPayload"
            - $ref: "#/components/schemas/toolInputStartPayload"
            - $ref: "#/components/schemas/toolInputDeltaPayload"
            - $ref: "#/components/schemas/toolInputAvailablePayload"
            - $ref: "#/components/schemas/toolOutputAvailablePayload"
            - $ref: "#/components/schemas/toolOutputErrorPayload"
            - $ref: "#/components/schemas/startStepPayload"
            - $ref: "#/components/schemas/finishStepPayload"
            - $ref: "#/components/schemas/sourceUrlPayload"
            - $ref: "#/components/schemas/filePayload"
            - $ref: "#/components/schemas/errorPayload"
            - $ref: "#/components/schemas/finishPayload"
            - $ref: "#/components/schemas/abortPayload"
            - $ref: "#/components/schemas/fileChangePayload"
            - $ref: "#/components/schemas/toolProgressPayload"
            - $ref: "#/components/schemas/questionPayload"
            - $ref: "#/components/schemas/todosUpdatePayload"

operations:
  sendChat:
    action: send
    channel:
      $ref: "#/channels/chat"
    summary: "发送客户端消息 (chat / cancel / answer)"
  receiveChat:
    action: receive
    channel:
      $ref: "#/channels/chat"
    summary: "接收服务端流式消息 (20 种事件)"

components:
  messages:
    chat:
      name: chat
      title: 发起 Agentic Chat
      summary: 启动一个完整的 AI Agent 对话会话 (含工具调用循环)。
      description: |
        同一连接同一时间只能处理一条 chat 消息。如果在处理中再次发送，服务端返回 error (A message is already being processed)。
      payload:
        $ref: "#/components/schemas/chatPayload"

    cancel:
      name: cancel
      title: 取消当前会话
      summary: 设置中止标志位，通知服务端停止发送流式数据。
      description: |
        cancel 仅设置标志位，不会立即中止正在运行的 streamText() 调用（无 AbortController 透传）。但 onChunk 回调会检查标志位并停止发送消息。
      payload:
        $ref: "#/components/schemas/cancelPayload"

    answer:
      name: answer
      title: 回答 AI 提问
      summary: 当 AI 通过 question 工具提问时，客户端发送回答。服务端等待最多 60 秒。
      payload:
        $ref: "#/components/schemas/answerPayload"

    start:
      name: start
      title: 消息开始
      summary: 标记一条新的 AI 响应开始。
      payload:
        $ref: "#/components/schemas/startPayload"

    done:
      name: done
      title: 消息结束
      summary: 标记一条 AI 响应完全结束。
      payload:
        $ref: "#/components/schemas/donePayload"

    textStart:
      name: text-start
      title: 文本流开始
      summary: 开始一段增量文本输出。
      payload:
        $ref: "#/components/schemas/textStartPayload"

    textDelta:
      name: text-delta
      title: 文本增量
      summary: 流式输出的增量文本片段。
      payload:
        $ref: "#/components/schemas/textDeltaPayload"

    textEnd:
      name: text-end
      title: 文本流结束
      summary: 一段增量文本输出结束。
      payload:
        $ref: "#/components/schemas/textEndPayload"

    reasoningStart:
      name: reasoning-start
      title: 推理流开始
      summary: 开始一段 AI 推理过程输出 (如 DeepSeek-R1 的 CoT)。
      payload:
        $ref: "#/components/schemas/reasoningStartPayload"

    reasoningDelta:
      name: reasoning-delta
      title: 推理增量
      summary: 推理过程的增量文本片段。
      payload:
        $ref: "#/components/schemas/reasoningDeltaPayload"

    reasoningEnd:
      name: reasoning-end
      title: 推理流结束
      summary: 一段推理输出结束。
      payload:
        $ref: "#/components/schemas/reasoningEndPayload"

    toolInputStart:
      name: tool-input-start
      title: 工具输入开始
      summary: AI 开始调用工具。
      payload:
        $ref: "#/components/schemas/toolInputStartPayload"

    toolInputDelta:
      name: tool-input-delta
      title: 工具输入增量
      summary: 工具调用参数的增量流式片段。
      payload:
        $ref: "#/components/schemas/toolInputDeltaPayload"

    toolInputAvailable:
      name: tool-input-available
      title: 工具输入完成
      summary: 工具调用参数已完整，即将执行工具。
      payload:
        $ref: "#/components/schemas/toolInputAvailablePayload"

    toolOutputAvailable:
      name: tool-output-available
      title: 工具执行结果
      summary: 工具执行成功，返回结果。
      payload:
        $ref: "#/components/schemas/toolOutputAvailablePayload"

    toolOutputError:
      name: tool-output-error
      title: 工具执行失败
      summary: 工具执行出错。
      payload:
        $ref: "#/components/schemas/toolOutputErrorPayload"

    startStep:
      name: start-step
      title: Step 开始
      summary: 标记一个新的 Agent Step 开始。
      payload:
        $ref: "#/components/schemas/startStepPayload"

    finishStep:
      name: finish-step
      title: Step 结束
      summary: 标记当前 Agent Step 结束。
      payload:
        $ref: "#/components/schemas/finishStepPayload"

    sourceUrl:
      name: source-url
      title: 文件引用
      summary: 服务端引用一个文件来源。
      payload:
        $ref: "#/components/schemas/sourceUrlPayload"

    file:
      name: file
      title: 文件内容引用
      summary: 服务端引用一个文件。
      payload:
        $ref: "#/components/schemas/filePayload"

    error:
      name: error
      title: 错误
      summary: 会话中发生错误。
      payload:
        $ref: "#/components/schemas/errorPayload"

    finish:
      name: finish
      title: 完成 (含用量)
      summary: AI 生成完成，包含 token 用量统计。
      payload:
        $ref: "#/components/schemas/finishPayload"

    abort:
      name: abort
      title: 中止
      summary: 会话被取消或错误中止。
      payload:
        $ref: "#/components/schemas/abortPayload"

    fileChange:
      name: file-change
      title: 文件变更通知
      summary: AI 工具执行后产生的文件变更。
      payload:
        $ref: "#/components/schemas/fileChangePayload"

    toolProgress:
      name: tool-progress
      title: 工具执行进度
      summary: 工具执行过程中的进度更新。
      payload:
        $ref: "#/components/schemas/toolProgressPayload"

    question:
      name: question
      title: AI 提问
      summary: AI 需要用户交互确认，客户端应在 60 秒内回复 answer 消息。
      payload:
        $ref: "#/components/schemas/questionPayload"

    todosUpdate:
      name: todos-update
      title: 任务列表更新
      summary: AI 调用 todowrite 工具后，实时推送任务列表到前端。
      payload:
        $ref: "#/components/schemas/todosUpdatePayload"

  schemas:
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        toolCallId:
          type: string
        toolName:
          type: string

    TodoItem:
      type: object
      required: [content, status, priority]
      properties:
        content:
          type: string
          description: 任务描述
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
          description: 任务状态
        priority:
          type: string
          enum: [high, medium, low]
          description: 任务优先级

    # --- 客户端 Payload ---
    chatPayload:
      type: object
      required: [type, messages]
      properties:
        type:
          type: string
          enum: [chat]
        messageId:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        provider:
          type: string
        model:
          type: string
        apiKey:
          type: string

    cancelPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [cancel]

    answerPayload:
      type: object
      required: [type, toolCallId, answers]
      properties:
        type:
          type: string
          enum: [answer]
        toolCallId:
          type: string
        answers:
          type: array
          items:
            type: array
            items:
              type: string

    # --- 服务端 Payload ---

    startPayload:
      type: object
      required: [type, messageId]
      properties:
        type:
          type: string
          enum: [start]
        messageId:
          type: string

    donePayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [done]

    textStartPayload:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [text-start]
        id:
          type: string

    textDeltaPayload:
      type: object
      required: [type, id, delta]
      properties:
        type:
          type: string
          enum: [text-delta]
        id:
          type: string
        delta:
          type: string

    textEndPayload:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [text-end]
        id:
          type: string

    reasoningStartPayload:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [reasoning-start]
        id:
          type: string

    reasoningDeltaPayload:
      type: object
      required: [type, id, delta]
      properties:
        type:
          type: string
          enum: [reasoning-delta]
        id:
          type: string
        delta:
          type: string

    reasoningEndPayload:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [reasoning-end]
        id:
          type: string

    toolInputStartPayload:
      type: object
      required: [type, toolCallId, toolName]
      properties:
        type:
          type: string
          enum: [tool-input-start]
        toolCallId:
          type: string
        toolName:
          type: string

    toolInputDeltaPayload:
      type: object
      required: [type, toolCallId, inputTextDelta]
      properties:
        type:
          type: string
          enum: [tool-input-delta]
        toolCallId:
          type: string
        inputTextDelta:
          type: string

    toolInputAvailablePayload:
      type: object
      required: [type, toolCallId, toolName, input]
      properties:
        type:
          type: string
          enum: [tool-input-available]
        toolCallId:
          type: string
        toolName:
          type: string
        input: {}

    toolOutputAvailablePayload:
      type: object
      required: [type, toolCallId, output]
      properties:
        type:
          type: string
          enum: [tool-output-available]
        toolCallId:
          type: string
        output: {}

    toolOutputErrorPayload:
      type: object
      required: [type, toolCallId, errorText]
      properties:
        type:
          type: string
          enum: [tool-output-error]
        toolCallId:
          type: string
        errorText:
          type: string

    startStepPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [start-step]

    finishStepPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [finish-step]

    sourceUrlPayload:
      type: object
      required: [type, sourceId, url]
      properties:
        type:
          type: string
          enum: [source-url]
        sourceId:
          type: string
        url:
          type: string
        title:
          type: string

    filePayload:
      type: object
      required: [type, url, mediaType]
      properties:
        type:
          type: string
          enum: [file]
        url:
          type: string
        mediaType:
          type: string

    errorPayload:
      type: object
      required: [type, errorText]
      properties:
        type:
          type: string
          enum: [error]
        errorText:
          type: string

    finishPayload:
      type: object
      required: [type, usage]
      properties:
        type:
          type: string
          enum: [finish]
        usage:
          type: object
          required: [promptTokens, completionTokens]
          properties:
            promptTokens:
              type: integer
            completionTokens:
              type: integer

    abortPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [abort]
        reason:
          type: string

    fileChangePayload:
      type: object
      required: [type, action, path]
      properties:
        type:
          type: string
          enum: [file-change]
        action:
          type: string
          enum: [write, delete]
        path:
          type: string

    toolProgressPayload:
      type: object
      required: [type, toolCallId, toolName, content]
      properties:
        type:
          type: string
          enum: [tool-progress]
        toolCallId:
          type: string
        toolName:
          type: string
        title:
          type: string
        content:
          type: string

    questionPayload:
      type: object
      required: [type, toolCallId, questions]
      properties:
        type:
          type: string
          enum: [question]
        toolCallId:
          type: string
        questions:
          type: array

    todosUpdatePayload:
      type: object
      required: [type, todos]
      properties:
        type:
          type: string
          enum: [todos-update]
        todos:
          type: array
          items:
            $ref: "#/components/schemas/TodoItem"
